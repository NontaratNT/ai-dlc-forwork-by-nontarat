<div>
    <dx-button style="color: black !important;" hint="ย้อนกลับ" text="ย้อนกลับ" (onClick)="Back()">
    </dx-button>
</div>
<div class="p-lg-5" style="overflow: auto;">
    <dx-tab-panel id="tabPanel" [selectedIndex]="0" [loop]="false" [animationEnabled]="true" [swipeEnabled]="true">
        <dxi-item title="ภาพรวม">
            <ng-container>
                <app-overview></app-overview>
            </ng-container>
        </dxi-item>
        <dxi-item title="ใบคำขอ">
            <ng-container *dxTemplate>
                <app-cyber-journal></app-cyber-journal>
            </ng-container>
        </dxi-item>
        <dxi-item title="แนบเอกสาร">
            <ng-container *dxTemplate>
                <app-attach-file></app-attach-file>
            </ng-container>
        </dxi-item>
        <dxi-item title="สนทนา">
            <ng-container *dxTemplate>
                <app-chat></app-chat>
            </ng-container>
        </dxi-item>
    </dx-tab-panel>
</div>
