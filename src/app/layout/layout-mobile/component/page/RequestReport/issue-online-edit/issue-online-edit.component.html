<div>
    <div *ngIf="loadTab" class="block-main">
        <div style="background: #374784;
        ">
            <div class="chatCount" *ngIf="numCount > 0">{{numCount}}</div>
            <img src="assets/icon/chat.png" (click)="openChat(2)" *ngIf="visible_chat === false" class="button-chat">
        </div>
        <div id="form-readonly" class="block-drawer-child-content-tab">
            <!-- <dx-multi-view [focusStateEnabled]="false" [animationEnabled]="false" [swipeEnabled]="false" [(selectedIndex)]="tabIndex"> -->
            <dx-multi-view [focusStateEnabled]="false" [animationEnabled]="false" [swipeEnabled]="false"
                [(selectedIndex)]="tabIndex">
                <dxi-item>
                    <ng-container>
                        <app-issue-online-container readonly="true" [edit]="true" [indexCount]="numCounttt" [dataForm]="dataForm">
                        </app-issue-online-container>
                    </ng-container>
                </dxi-item>
                <dxi-item>
                    <ng-container *dxTemplate>
                        <app-attach-file></app-attach-file>
                    </ng-container>
                </dxi-item>
                <dxi-item>
                    <ng-container *dxTemplate>
                        <app-chat></app-chat>
                    </ng-container>
                </dxi-item>
                <!-- <dxi-item>
                    <ng-container *dxTemplate>
                        <app-track-appointment [dataForm]="dataForm"></app-track-appointment>
                    </ng-container>
                </dxi-item> -->
            </dx-multi-view>
        </div>
    </div>
</div>
