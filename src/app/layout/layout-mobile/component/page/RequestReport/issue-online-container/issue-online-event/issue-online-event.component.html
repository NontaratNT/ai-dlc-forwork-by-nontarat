                        </dx-select-box>
                        <dx-text-box *ngIf="formReadOnly" [readOnly]="formReadOnly" [(value)]="formData.CASE_TYPE_NAME"></dx-text-box>

    <div class="conten-block  block-location-collaps">
        <div class="content-block">
            <div class="content-form">
                <div class="card location-collaps">
                    <div class="card-header collaps-header not-copy active">
                        <div>สถานที่ถูกหลอกให้หลงเชื่อ</div>
                        <div class="icon">
                            <i class="collaps fa fa-angle-down"></i>
                            <i class="expand fa fa-angle-up"></i>
                        </div>
                    </div>
                    <div class="card-body collaps-body" style="display: block;">
                        <div *ngIf="formLocationLoad">
                            <app-view-address #viewadress
                                [renderView]="'view1'"
                                [type]="locationRender"
                                [province]="province"
                                [replaceKey]="'CASE_LOCATION'"
                                [checkValidate]="checkValidateAddress"
                                [(dataForm)]="formLocation"></app-view-address>
                        </div>
                    </div>
                </div>
            </div>
            <div class="content-end-line"></div>
        </div>
        <div class="content-block">
            <div class="content-form">
                <div class="card location-collaps">
                    <div class="card-header collaps-header not-copy">
                        <div>สถานที่โอนเงิน</div>
                        <div class="icon">
                            <i class="collaps fa fa-angle-down"></i>
                            <i class="expand fa fa-angle-up"></i>
                        </div>
                    </div>
                    <div class="card-body collaps-body">
                        <div *ngIf="formLocationTranferLoad">
                            <app-view-address
                                [renderView]="'view2'"
                                [type]="locationRender"
                                [province]="province"
                                [replaceKey]="'CASE_LOCATION_TRANSFER'"
                                [checkValidate]="checkValidateAddress"
                                [(dataForm)]="formLocationTranfer"></app-view-address>
                        </div>
                    </div>
                </div>
            </div>
            <div class="content-end-line"></div>
        </div>

<div class="text-center btn-footer">
    <dx-button *ngIf="formType==='add'" class="btn btn-back" text="ย้อนกลับ" (onClick)="Back($event)">
    </dx-button>
    &nbsp;
    <dx-button *ngIf="formType==='add'" class="btn btn-submit" text="ถัดไป" (onClick)="SubmitForm($event)"></dx-button>
</div>
<dx-load-panel shadingColor="rgba(0,0,0,0.4)" [visible]="isLoading" [showIndicator]="true" [showPane]="true" [shading]="true" [closeOnOutsideClick]="false" message="กรุณารอสักครู่..." shadingColor="rgba(0, 0, 0, 0.2)">
</dx-load-panel>
