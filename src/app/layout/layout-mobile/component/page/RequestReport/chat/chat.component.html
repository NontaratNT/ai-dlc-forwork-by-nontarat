<div [ngClass]="{ 'box-content-chat': checkChat, 'box-content': !checkChat }">
    <div [ngClass]="{ 'messaging-chat': checkChat, 'messaging': !checkChat }">
        <div class="header-title" *ngIf="!checkChat">
            <div style="text-align: right; font-weight: bold; margin-top: 12px; font-size: 20px;">
                ติดต่อสอบถามเจ้าหน้าที่
            </div>
            <h6 style="font-size: 14px; text-align: right;">สำหรับการสนทนาติดต่อสอบถามข้อมูลกับเจ้าหน้าที่
            </h6>
        </div>
        <dx-scroll-view #chatScrollView [showScrollbar]="'always'" style="height: 550px;">
            <div class="mesgs" #scrollMe (scroll)="onScroll()">
                <div class="msg_history">
                    <div *ngFor="let item of formData">
                        <ng-container *ngIf="CheckEmptyText(item.dateTimeChat)">
                            <div class="datetime-chat">{{item.dateTimeChat}}</div>
                        </ng-container>
                        <ng-container *ngIf="!CheckEmptyText(item.dateTimeChat)">
                            <div *ngIf="item.SENDER_ID !== this.userId">
                                <div class="incoming_msg">
                                    <div class="received_msg">
                                        <div class="incoming_msg_img">
                                            <img class="user-img" [src]="item.PERSONAL_PICTURE" alt="user" (error)="setDefaultPic(item)"
                                                [title]="item.PERSONAL_FULL_NAME">
                                        </div>
                                        <div class="received_withd_msg">
                                            <div class="received-msg">
                                                {{item.INST_CHAT_MASSAGE}}
                                            </div>
                                            <div class="received-time">
                                                {{item.CREATE_SDATE}}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div *ngIf="item.SENDER_ID === this.userId">
                                <div class="outgoing_msg">
                                    <div class="received_sent_msg">
                                        <div class="sent_msg">
                                            <div class="sent-msg-msg">
                                                {{item.INST_CHAT_MASSAGE}}
                                            </div>
                                            <div class="sent-msg-time">
                                                {{item.CREATE_SDATE}}
                                            </div>
                                        </div>
                                        <div class="sent_msg_img">
                                            <img class="user-img" [src]="item.PERSONAL_PICTURE" alt="user" (error)="setDefaultPic(item)"
                                                [title]="item.PERSONAL_FULL_NAME">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </ng-container>


                    </div>
                </div>
            </div>
        </dx-scroll-view>
        <div class="input_msg_write d-flex  w-100 text-center justify-content-center" style="margin-bottom: 25px;" *ngIf="caseWorking">
            <dx-text-area class="w-100 ml-1 mr-1" style="max-width: 100%; height: 40px;"
                [(value)]="formChat.INST_CHAT_MASSAGE" placeholder="ระบุข้อความ"></dx-text-area>
            <div class="my-btn ml-1" style="
            margin-left: 10px !important;">
                <img src="assets/icon/plan.png" style="width: 40px; padding-top: 6px;" (click)="sendMessage()">
            </div>
        </div>
    </div>
    <div class="text-center btn-dx" *ngIf="!checkChat">
        <button class="btn btn-cancle" (click)="onBack()">ย้อนกลับ</button>&nbsp;
    </div>
</div>

<dx-load-panel shadingColor="rgba(0,0,0,0.4)" [visible]="_isLoading" [showIndicator]="true" [showPane]="true"
    [shading]="true" [closeOnOutsideClick]="false" message="กรุณารอสักครู่..." shadingColor="rgba(0, 0, 0, 0.2)">
</dx-load-panel>
