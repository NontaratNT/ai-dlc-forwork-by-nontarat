<div class="conten-block block-location-collaps">
    <div class="content-block">
        <div class="content-form">
            <div class="card location-collaps">
                <div class="card-header collaps-header not-copy active">
                    <div>สถานที่ถูกหลอกให้หลงเชื่อ หรือสถานที่ได้ทราบข้อความ (กรณีเป็นเรื่องของหมิ่นประมาท)</div>
                    <div class="icon">
                        <i class="collaps fa fa-angle-down"></i>
                        <i class="expand fa fa-angle-up"></i>
                    </div>
                </div>
                <div class="card-body collaps-body" style="display: block;">
                    <div *ngIf="formLocationLoad">
                        <app-view-address #viewadress 
                            [renderView]="'view1'" 
                            [type]="locationRender" 
                            [replaceKey]="'CASE_LOCATION'" 
                            [(dataForm)]="formLocation"></app-view-address>
                    </div>
                </div>
            </div>
        </div>
        <div class="content-end-line"></div>
    </div>
    <div class="content-block">
        <div class="content-form">
            <div class="card location-collaps">
                <div class="card-header collaps-header not-copy">
                    <div>สถานที่โอนเงิน</div>
                    <div class="icon">
                        <i class="collaps fa fa-angle-down"></i>
                        <i class="expand fa fa-angle-up"></i>
                    </div>
                </div>
                <div class="card-body collaps-body">
                    <div *ngIf="formLocationTranferLoad">
                        <app-view-address [renderView]="'view2'" [type]="locationRender"
                            [replaceKey]="'CASE_LOCATION_TRANSFER'"
                            [(dataForm)]="formLocationTranfer"></app-view-address>
                    </div>
                </div>
            </div>
        </div>
        <div class="content-end-line"></div>
    </div>
    <div class="content-block">
        <div class="content-form">
            <div class="card location-collaps">
                <div class="card-header collaps-header not-copy">
                    <div *ngIf="userType==='mySelf'">ที่ตั้งธนาคารบัญชีของผู้เสียหาย</div>
                    <div *ngIf="userType==='other'">ที่ตั้งธนาคารบัญชีของผู้แจ้ง</div>
                    <div class="icon">
                        <i class="collaps fa fa-angle-down"></i>
                        <i class="expand fa fa-angle-up"></i>
                    </div>
                </div>
                <div class="card-body collaps-body">
                    <div *ngIf="formLocationBankVictimLoad">
                        <app-view-address [renderView]="'view3'" [type]="locationRender"
                            [replaceKey]="'CASE_LOCATION_BANK_VICTIM'"
                            [(dataForm)]="formLocationBankVictim"></app-view-address>
                    </div>
                </div>
            </div>
        </div>
        <div class="content-end-line"></div>
    </div>
    <div>
        <h1 style="font-size: 20px;font-weight: bold;color: red;">ข้อมูลที่ตั้งบัญชีธนาคารคนร้าย</h1>
    </div>
    <div class="content-block">
        <div class="content-form">
            <div class="card location-collaps">
                <div class="card-header collaps-header not-copy" style="background-color: red !important;">
                    <div>ที่ตั้งบัญชีธนาคารคนร้าย</div>
                    <div class="icon">
                        <i class="collaps fa fa-angle-down"></i>
                        <i class="expand fa fa-angle-up"></i>
                    </div>
                </div>
                <div class="card-body collaps-body">
                    <div *ngIf="formLocationBankVillainLoad">
                        <app-view-address [renderView]="'view3'" [type]="locationRender"
                            [replaceKey]="'CASE_LOCATION_BANK_VILLAIN'"
                            [(dataForm)]="formLocationBankVillain"></app-view-address>
                    </div>
                </div>
            </div>
        </div>
        <div class="content-end-line"></div>
    </div>
    <!-- <div class="content-block">
        <div class="content-title">ที่ตั้งบัญชีธนาคารคนร้าย</div>
        <div class="content-form" *ngIf="formLocationBankVillainLoad">
            <app-view-address [renderView]="'view3'" [type]="locationRender" [replaceKey]="'CASE_LOCATION_BANK_VILLAIN'" [(dataForm)]="formLocationBankVillain"></app-view-address>
        </div>
        <div class="content-end-line"></div>
    </div> -->
</div>

<div class="text-right btn-footer">
    <dx-button class="btn btn-back" text="ย้อนกลับ" (onClick)="Back($event)">
    </dx-button>
    &nbsp;
    <dx-button class="btn btn-submit" text="ถัดไป" (onClick)="SubmitForm($event)"></dx-button>
</div>
<dx-load-panel shadingColor="rgba(0,0,0,0.4)" [visible]="isLoading" [showIndicator]="true" [showPane]="true"
    [shading]="true" [closeOnOutsideClick]="false" message="กรุณารอสักครู่..." shadingColor="rgba(0, 0, 0, 0.2)">
</dx-load-panel>
