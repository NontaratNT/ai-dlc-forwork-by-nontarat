<div class="freeze-container">
    <header class="freeze-header">
        <h2 class="freeze-title">แจ้งอายัดบัญชีด้วยตัวเอง</h2>
        <div class="freeze-controls">
            <button class="sort-button">เรียงจาก <span class="sort-icon">⬆</span></button>
            <input type="text" placeholder="ค้นหารายการที่ต้องการ" class="search-input">
        </div>
    </header>

    <div class="freeze-form">
        <div class="freeze-content">
            <section class="freeze-cards">
                <div class="highlight-card">
                    <div class="highlight-item">
                        <img src="assets/icon/checkgon.png" alt="เช็คก่อน" class="highlight-img">
                        <h3>เช็คก่อน</h3>
                        <p>เว็บไซต์สำหรับตรวจสอบและเช็กคนโกง</p>
                    </div>
                    <div class="highlight-item">
                        <img src="assets/icon/logo_CHO1.png" alt="ฉลาดโอน" class="highlight-img">
                        <h3>ฉลาดโอน</h3>
                        <p>เช็กก่อนเชื่อบริการช่วยตรวจสอบ<br>บัญชีปลายทางก่อนโอนเงิน</p>
                    </div>
                </div>
            </section>

            <section class="bank-list">
                <div class="bank-item" *ngFor="let bank of paginatedBanks[currentPage]">
                    <img [src]="bank.logo" [alt]="bank.name" class="bank-logo">
                    <div class="bank-details">
                        <h4>{{ bank.name }}</h4>
                        <p>{{ bank.phone }}</p>
                    </div>
                    <a [href]="'tel:' + bank.phone" class="call-button">
                        <i class="fas fa-phone"></i>
                    </a>
                </div>
            </section>
        </div>

        <footer class="pagination-controls">
            <div class="dot-controls">
                <span *ngFor="let page of paginatedBanks; let i = index" class="dot" [class.active]="i === currentPage"
                    (click)="navigateToPage(i)"></span>
            </div>
            <div>
            <button class="prev-button" (click)="prevPage()" [disabled]="currentPage === 0">&larr;</button>
            <button class="next-button" (click)="nextPage()"
                [disabled]="currentPage === paginatedBanks.length - 1">&rarr;</button>
            </div>
        </footer>
    </div>
</div>
