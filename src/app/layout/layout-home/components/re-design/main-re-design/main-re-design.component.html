<div class="slider-container">
     <div class="slides" [style.transform]="'translateX(-' + currentIndex * 100 + '%)'">
          <div class="slide" *ngFor="let slide of slides">
               <img src="{{slide.images}}" alt="">
          </div>
     </div>

     <!-- Navigation Arrows -->
     <button class="nav left" (click)="prevSlide()">&#10094;</button>
     <button class="nav right" (click)="nextSlide()">&#10095;</button>

     <!-- Dots for Slide Navigation -->
     <div class="dots">
          <span class="dot" *ngFor="let slide of slides; let i = index" [class.active]="i === currentIndex"
               (click)="goToSlide(i)"></span>
     </div>
</div>
