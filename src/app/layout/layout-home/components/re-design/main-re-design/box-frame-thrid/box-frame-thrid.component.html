<div class=" py-5 d-flex flex-column justify-content-between">
     <div *ngFor="let group of appInfo | keyvalue; trackBy: trackByGroup"
          class="container mb-5 d-flex flex-column flex-md-row justify-content-between align-items-center bg-gray-300 rounded-xl">
          <div class="text-center text-md-left p">
               <h1 class="display-4 font-weight-bold h1 text-warning">{{ group.key }}</h1>
               <p class="mb-4 text-blue font-weight-bold h4" [innerHTML]="group.value.AppDescription"></p>
               <p class="text-blue font-weight-bold font-sm" [ngClass]="{'d-none': group.value.Apps?.length == 0}">
                    {{ group.value.Apps?.length >= 2 ? 'สามารถดาวน์โหลด Mobile Application ได้ทั้งสองระบบ' :
                    'สามารถดาวน์โหลด Mobile Application' }}
               </p>
               <div class="d-flex justify-content-center m-2">
                    <div *ngFor="let app of group.value.Apps; trackBy: trackByApp"
                         class="d-flex align-items-center py-2 rounded-3 mr-1">
                         <img [src]="app.ImageUrl" [alt]="app.AppType" class="app-image" (click)="openApp(app.AppLink)">
                    </div>
               </div>
          </div>
          <div>
               <img src="../assets/image/img/phone.png" alt="Phone Mockup" class="img-fluid rounded-xl mh">
          </div>
     </div>
</div>
