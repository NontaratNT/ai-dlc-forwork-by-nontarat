<div *ngIf="types === 'main'">
     <div class="scrollSecurity">
          <div class="boxSecurity">

               <div class="headerBox">
                    <label class="header" for="">บริการเสริมความปลอดภัย</label>
                    <div class="scrollBtnContainer">
                         <div class="left" (mousedown)="onMouseDown($event, 'left')" (click)="scrollLeftSmoothly()">
                              &#8592;
                         </div>

                         <div class="right" (mousedown)="onMouseDown($event, 'right')" (click)="scrollRight()">
                              &#8594;
                         </div>
                    </div>
               </div>


               <div class="contentSecurity" #contentSecurity (scroll)="onScroll($event)">
                    <div *ngFor="let item of detailSecurity">
                         <div class="boxContent" (click)="onSwitchService(item.ServiceId)" *ngIf="item.ServiceSeq < 4 && !item.ServiceTitle.includes('none')">
                              <img [src]="item.ImageUrl" class="imageNews">
                              <label class="descSecurity">{{ item.ServiceDescription }}</label>
                         </div>

                         <div class="boxContent-full-banner" (click)="onSwitchService(item.ServiceId)" *ngIf="item.ServiceTitle.includes('none')">
                              <img [src]="item.ImageUrl" class="imageNews">
                         </div>

                         <div class="boxContentRow" (click)="onSwitchService(item.ServiceId)"
                              *ngIf="item.ServiceSeq >= 4 && !item.ServiceTitle.includes('none')">
                              <img [src]="item.ImageUrl" class="imageNews">
                              <label class="descSecurity">{{ item.ServiceDescription }}</label>
                         </div>
                    </div>
               </div>

               <div class="progressContainer">
                    <div class="progressBar" [style.width.%]="scrollProgress"></div>
               </div>
          </div>
     </div>
</div>


<div class="containerSecuritywitget" *ngIf="types === 'witget'">
     <div class="textSecuritywitget">บริการเสริมความปลอดภัย</div>
     <div class="boxSecuritywitget">
          <ng-container *ngFor="let item of detailSecurity">
               <label class="securityWitget" (click)="onSwitchService(item.ServiceId) " tabindex="0">
                    <div class="iconSecuritywitget">
                         <img [src]="item.ImageUrl" class="imageNewswitget">
                    </div>
                    <label class="descSecuritywitget">{{ item.ServiceDescription }}</label>
               </label>
          </ng-container>
     </div>
</div>
