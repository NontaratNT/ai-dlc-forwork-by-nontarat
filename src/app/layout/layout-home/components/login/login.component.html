<div class="block-content-detail not-copy">
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="block-title-box">
                    <div class="title-th">การรับแจ้งความทางออนไลน์คดีอาชญากรรมทางเทคโนโลยี</div>
                    <div class="title-th">สำนักงานตำรวจแห่งชาติ</div>
                    <!-- <div style="color: #fff;display: flex;justify-content: center;"><p>live on azure</p></div> -->
                </div>
            </div>
            <div class="col-12">
                <div class="block-while-box">
                    <form action="#" method="post">
                        <div class="form-group">
                            <label for="username">เบอร์โทรศัพท์หรืออีเมล</label>
                            <input #username type="text" class="form-control" placeholder="กรุณากรอกเบอร์โทรศัพท์หรืออีเมลของท่าน" id="username" (keyup.enter)="Login(username.value,password.value)">
                        </div>
                        <div class="form-group">
                            <label for="password">รหัสผ่าน</label>
                            <input #password type="password" class="form-control" placeholder="กรุณากรอกรหัสผ่าน" id="password" (keyup.enter)="Login(username.value,password.value)">
                        </div>
                        <div class="block-forget-password text-right">
                            <span class="text-link" (click)="SelectForget()">ลืมรหัสผ่าน?</span>
                        </div>
                        <div class="block-login">
                            <dx-button class="btns-login" icon="assets/image/police/desktop/logout.png" text="เข้าสู่ระบบ" (onClick)="Login(username.value,password.value)"></dx-button>
                        </div>
                        <div class="block-line">
                            <div class="draw-line">
                                <span class="text-line">หรือ</span>
                            </div>
                        </div>
                        <div class="block-register">
                            <dx-button class="btns-register" text="คลิกเพื่อลงทะเบียน" (onClick)="SelectRegister()"></dx-button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<dx-load-panel shadingColor="rgba(0,0,0,0.4)" [visible]="_isLoading" [showIndicator]="true" [showPane]="true" [shading]="true" [closeOnOutsideClick]="false" message="กรุณารอสักครู่..." shadingColor="rgba(0, 0, 0, 0.2)">
