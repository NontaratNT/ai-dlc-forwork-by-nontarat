<div class="menuHeader">
    <ul class="menuHeaderLeft">
        <li class="boxLogo">
            <img src="assets/icon/Emblem_of_Royal_Thai_Police 1.png" alt="logo" (click)="RedirectUrl('/')">
            <!-- <img src="assets/icon/Cyber.png" alt="logo" (click)="RedirectUrl('/')"> -->
        </li>
        <li class="boxCyberCrime">
            <label class="mainTitle">
                ศูนย์ปราบปรามอาชญากรรมทางเทคโนโลยีสารสนเทศ (ศปอส.ตร.)
            </label>
            <label class="subTitle">
                ดูแลโดย กองบัญชาการตำรวจสืบสวนสอบสวนอาชญากรรมทางเทคโนโลยี
            </label>
        </li>
    </ul>

    <!-- เมนูขวา -->
    <ul class="menuHeaderRight" [ngClass]="{'open': menuOpen}">
        <li (click)="scrollToSection('home', '/')">
            <label class="textRight">หน้าหลัก</label>
        </li>
        <li (click)="scrollToSection('cyber-security')">
            <label class="textRight">ป้องกันภัยไซเบอร์</label>
        </li>
        <li (click)="scrollToSection('news')">
            <label class="textRight">ข่าวสาร</label>
        </li>
        <li (click)="scrollToSection('freeze-account')">
            <label class="textRight">อายัดบัญชี</label>
        </li>
        <li (click)="scrollToSection('faq')">
            <label class="textRight">คำถามที่พบบ่อย</label>
        </li>
        <!-- <li (click)="RedirectUrl('/')">
            <label class="textRight">ตัวช่วยการเข้าถึง</label>
        </li> -->
        <li class="boxButton" *ngIf="!hasSession">
            <div class="btnSignin" (click)="OnIssueOnline()">
                <img src="assets/icon/check_light.png" height="30px" alt="icon">
                <label class="textSignin">เข้าสู่ระบบ</label>
            </div>
        </li>

        <li *ngIf="hasSession">
            <div class="btnLogout" (click)="logout()">
                <label class="textLogout">ออกจากระบบ</label>
            </div>
        </li>
    </ul>

    <!-- ปุ่มฮัมเบอร์เกอร์ -->
    <div class="hamburger-menu" (click)="toggleMenu()">
        <img class="iconHamburger" [src]="menuOpen ? 'assets/image/btn/close.png' : 'assets/image/btn/hamburger.png'"
            [class.open]="menuOpen" alt="Menu">
    </div>
</div>
